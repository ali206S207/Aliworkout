<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali Workout — PPL</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#F5A623; --orange:#E8541A;
  --bg:#0A0A0A; --bg2:#111; --bg3:#1A1A1A; --bg4:#222;
  --white:#fff; --gray:#888; --border:rgba(255,255,255,0.07);
  --push:#E8541A; --pull:#3B82F6; --legs:#22C55E;
}
body.light {
  --bg:#F0F0F0; --bg2:#fff; --bg3:#F5F5F5; --bg4:#E8E8E8;
  --white:#0A0A0A; --gray:#666; --border:rgba(0,0,0,0.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--white);font-family:'Cairo',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;transition:background .3s;}
body.light .topbar{background:rgba(240,240,240,.95);}
.topbar-logo{font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:3px;color:var(--gold);}
.topbar-actions{display:flex;gap:.5rem;}
.btn-icon{width:34px;height:34px;border:1px solid var(--border);background:var(--bg3);color:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .2s;border-radius:4px;}
.btn-icon:hover{border-color:var(--gold);color:var(--gold);}

/* ── HERO ── */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(232,84,26,.12) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(245,166,35,.07) 0%,transparent 50%),var(--bg);z-index:0;transition:background .3s;}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(245,166,35,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(245,166,35,.04) 1px,transparent 1px);background-size:60px 60px;z-index:0;}
.hero-content{position:relative;z-index:2;display:grid;grid-template-columns:1fr 1fr;align-items:flex-end;max-width:1200px;margin:0 auto;padding:6rem 2rem 4rem;gap:4rem;}
.hero-badge{display:inline-block;background:rgba(232,84,26,.15);border:1px solid rgba(232,84,26,.4);color:var(--orange);font-size:.7rem;font-weight:700;letter-spacing:3px;padding:.4rem 1rem;margin-bottom:1.5rem;text-transform:uppercase;font-family:'Oswald',sans-serif;}
.hero-name{font-family:'Oswald',sans-serif;font-size:clamp(3rem,8vw,7rem);font-weight:700;line-height:.9;text-transform:uppercase;letter-spacing:-2px;margin-bottom:1rem;color:var(--white);}
.hero-name .hl{color:var(--gold);display:block;}
.hero-program{font-family:'Oswald',sans-serif;font-size:clamp(.9rem,2vw,1.3rem);font-weight:400;color:var(--gray);letter-spacing:4px;text-transform:uppercase;margin-bottom:2rem;}
.hero-stats{display:flex;gap:2rem;}
.stat-num{font-family:'Oswald',sans-serif;font-size:2.5rem;font-weight:700;color:var(--gold);display:block;}
.stat-label{font-size:.65rem;color:var(--gray);letter-spacing:2px;text-transform:uppercase;}
.photo-frame{position:relative;width:380px;max-width:100%;margin:0 auto;}
.photo-frame::before{content:'';position:absolute;top:-12px;right:-12px;bottom:12px;left:12px;border:2px solid var(--gold);z-index:0;opacity:.5;}
.photo-frame::after{content:'';position:absolute;top:12px;right:12px;bottom:-12px;left:-12px;border:1px solid rgba(232,84,26,.4);z-index:0;}
.hero-photo{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:center top;display:block;position:relative;z-index:1;filter:grayscale(20%) contrast(1.1);}
.photo-accent{position:absolute;bottom:-20px;left:-20px;width:80px;height:80px;background:var(--orange);z-index:2;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:1px;text-align:center;text-transform:uppercase;line-height:1.3;padding:.5rem;color:#fff;}

/* ── TABS ── */
.nav-tabs{max-width:1200px;margin:2.5rem auto 0;padding:0 2rem;display:flex;gap:0;border-bottom:1px solid var(--border);}
.nav-tab{font-family:'Oswald',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:.75rem 1.4rem;cursor:pointer;color:var(--gray);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;}
.nav-tab:hover{color:var(--white);}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* ── PANELS ── */
.panel{display:none;max-width:1200px;margin:0 auto;padding:2rem 2rem 5rem;}
.panel.active{display:block;}
.section-header{text-align:center;margin-bottom:2.5rem;}
.section-label{font-family:'Oswald',sans-serif;font-size:.7rem;letter-spacing:4px;color:var(--orange);text-transform:uppercase;margin-bottom:.4rem;}
.section-title{font-family:'Oswald',sans-serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:700;text-transform:uppercase;color:var(--white);}

/* ── DAY CARDS ── */
.day-card{background:var(--bg2);border:1px solid var(--border);margin-bottom:1.5rem;overflow:hidden;transition:border-color .3s;}
.day-card:hover{border-color:rgba(255,255,255,.12);}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:1.4rem 1.8rem;cursor:pointer;user-select:none;position:relative;transition:background .2s;}
.day-header:hover{background:rgba(255,255,255,.02);}
.day-header::after{content:'';position:absolute;right:0;top:0;bottom:0;width:4px;}
.push .day-header::after{background:var(--push);}
.pull .day-header::after{background:var(--pull);}
.legs .day-header::after{background:var(--legs);}
.rest .day-header::after{background:var(--gray);}
.day-info{display:flex;align-items:center;gap:1.4rem;}
.day-number{font-family:'Oswald',sans-serif;font-size:3rem;font-weight:700;color:rgba(255,255,255,.06);line-height:1;min-width:55px;}
body.light .day-number{color:rgba(0,0,0,.07);}
.day-meta{display:flex;flex-direction:column;gap:.25rem;}
.day-name-ar{font-size:.82rem;color:var(--gray);font-weight:300;}
.day-name-en{font-family:'Oswald',sans-serif;font-size:1.7rem;font-weight:700;text-transform:uppercase;}
.push .day-name-en{color:var(--push);}
.pull .day-name-en{color:var(--pull);}
.legs .day-name-en{color:var(--legs);}
.rest .day-name-en{color:var(--gray);}
.day-tags{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.2rem;}
.tag{font-size:.58rem;font-weight:600;letter-spacing:1px;padding:.18rem .45rem;text-transform:uppercase;font-family:'Oswald',sans-serif;}
.push .tag{background:rgba(232,84,26,.12);color:var(--push);border:1px solid rgba(232,84,26,.25);}
.pull .tag{background:rgba(59,130,246,.12);color:var(--pull);border:1px solid rgba(59,130,246,.25);}
.legs .tag{background:rgba(34,197,94,.12);color:var(--legs);border:1px solid rgba(34,197,94,.25);}
.rest .tag{background:rgba(136,136,136,.08);color:var(--gray);border:1px solid rgba(136,136,136,.18);}
.toggle-btn{font-size:1.5rem;color:var(--gray);transition:transform .3s;flex-shrink:0;}
.day-card.open .toggle-btn{transform:rotate(45deg);}
.day-body{display:none;padding:0 1.8rem 2rem;}
.day-card.open .day-body{display:block;animation:slideDown .25s ease;}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}

/* ── MUSCLE GROUP TITLE ── */
.mg-title{font-family:'Oswald',sans-serif;font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--gray);margin:1.5rem 0 .75rem;padding-bottom:.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.6rem;}
.mg-title::before{content:'';width:16px;height:2px;flex-shrink:0;}
.push .mg-title::before{background:var(--push);}
.pull .mg-title::before{background:var(--pull);}
.legs .mg-title::before{background:var(--legs);}

/* ── EXERCISE CARD ── */
.ex-card{background:var(--bg3);border:1px solid var(--border);margin-bottom:.7rem;transition:border-color .2s;}
.ex-card:hover{border-color:rgba(255,255,255,.1);}
.ex-top{display:grid;grid-template-columns:26px 1fr auto;gap:.75rem;align-items:start;padding:.9rem 1rem;}
.ex-check{width:24px;height:24px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.7rem;transition:all .2s;flex-shrink:0;margin-top:2px;background:transparent;color:transparent;}
.push .ex-check{border-color:rgba(232,84,26,.4);}
.pull .ex-check{border-color:rgba(59,130,246,.4);}
.legs .ex-check{border-color:rgba(34,197,94,.4);}
.ex-check.done{color:#fff;}
.push .ex-check.done{background:var(--push);border-color:var(--push);}
.pull .ex-check.done{background:var(--pull);border-color:var(--pull);}
.legs .ex-check.done{background:var(--legs);border-color:var(--legs);}
.ex-card.completed .ex-name-ar{text-decoration:line-through;opacity:.5;}
.ex-info{display:flex;flex-direction:column;gap:.2rem;}
.ex-name-ar{font-size:.95rem;font-weight:600;color:var(--white);}
.ex-name-en{font-family:'Oswald',sans-serif;font-size:.68rem;color:var(--gray);text-transform:uppercase;letter-spacing:1px;}
.ex-benefits{font-size:.73rem;color:rgba(255,255,255,.38);margin-top:.15rem;line-height:1.5;}
body.light .ex-benefits{color:rgba(0,0,0,.38);}
.ex-muscles{display:flex;flex-direction:column;align-items:flex-start;gap:.18rem;flex-shrink:0;}
.mtag{font-size:.57rem;font-weight:600;letter-spacing:.5px;padding:.1rem .4rem;white-space:nowrap;font-family:'Cairo',sans-serif;border-radius:2px;}
.push .mtag{background:rgba(232,84,26,.1);color:rgba(232,84,26,.85);}
.pull .mtag{background:rgba(59,130,246,.1);color:rgba(59,130,246,.85);}
.legs .mtag{background:rgba(34,197,94,.1);color:rgba(34,197,94,.85);}

/* ── SETS SECTION ── */
.sets-section{border-top:1px solid var(--border);padding:.75rem 1rem 1rem;}
.sets-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;}
.sets-label{font-family:'Oswald',sans-serif;font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--gray);}
.btn-add-set{display:flex;align-items:center;gap:.35rem;padding:.3rem .75rem;border:1px dashed rgba(255,255,255,.15);background:transparent;color:var(--gray);cursor:pointer;font-family:'Oswald',sans-serif;font-size:.65rem;letter-spacing:1px;text-transform:uppercase;transition:all .2s;}
.btn-add-set:hover{border-color:var(--gold);color:var(--gold);}
.sets-list{display:flex;flex-direction:column;gap:.4rem;}
.set-row{display:grid;grid-template-columns:24px 1fr 1fr 1fr auto auto;gap:.5rem;align-items:center;background:var(--bg4);padding:.45rem .6rem;border:1px solid var(--border);}
.set-num{font-family:'Oswald',sans-serif;font-size:.75rem;font-weight:700;color:var(--gray);text-align:center;}
.set-inp-wrap{display:flex;flex-direction:column;gap:.15rem;}
.set-inp-wrap label{font-size:.52rem;color:var(--gray);letter-spacing:1px;text-transform:uppercase;font-family:'Oswald',sans-serif;}
.set-inp{width:100%;padding:.28rem .4rem;background:var(--bg);border:1px solid var(--border);color:var(--white);font-family:'Cairo',sans-serif;font-size:.82rem;text-align:center;outline:none;transition:border-color .2s;}
.set-inp:focus{border-color:var(--gold);}
body.light .set-inp{background:#e5e5e5;}
.set-check{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.15);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:transparent;transition:all .2s;flex-shrink:0;}
.set-check.done{color:#fff;border-color:var(--legs);background:var(--legs);}
.btn-del-set{width:22px;height:22px;border:none;background:transparent;color:rgba(255,255,255,.18);cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;transition:color .2s;flex-shrink:0;}
.btn-del-set:hover{color:#f87171;}
.timer-quick{display:flex;gap:.35rem;margin-top:.6rem;}
.tq-btn{padding:.28rem .6rem;border:1px solid var(--border);background:transparent;color:var(--gray);cursor:pointer;font-family:'Oswald',sans-serif;font-size:.62rem;letter-spacing:1px;text-transform:uppercase;transition:all .2s;}
.tq-btn:hover{border-color:var(--gold);color:var(--gold);}

/* ── REST CARD ── */
.rest-content{padding:2rem;text-align:center;color:var(--gray);}
.rest-icon{font-size:3rem;margin-bottom:1rem;display:block;}
.rest-text{font-size:.92rem;line-height:1.8;max-width:380px;margin:0 auto;}

/* ── GLOBAL TIMER ── */
.global-timer{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--gold);padding:.75rem 2rem;display:none;align-items:center;gap:1.5rem;z-index:200;box-shadow:0 0 40px rgba(245,166,35,.2);white-space:nowrap;}
.global-timer.visible{display:flex;}
.gt-label{font-size:.6rem;color:var(--gray);letter-spacing:2px;text-transform:uppercase;font-family:'Oswald',sans-serif;}
.gt-time{font-family:'Oswald',sans-serif;font-size:2rem;font-weight:700;color:var(--gold);min-width:65px;text-align:center;}
.gt-time.urgent{color:#f87171;animation:blink .5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.gt-presets{display:flex;gap:.35rem;}
.gt-preset{padding:.32rem .6rem;border:1px solid var(--border);background:transparent;color:var(--gray);cursor:pointer;font-family:'Oswald',sans-serif;font-size:.68rem;transition:all .2s;}
.gt-preset:hover,.gt-preset.sel{border-color:var(--gold);color:var(--gold);background:rgba(245,166,35,.08);}
.gt-btns{display:flex;gap:.4rem;}
.gt-btn{padding:.38rem .7rem;border:1px solid var(--border);background:var(--bg3);color:var(--white);cursor:pointer;font-family:'Oswald',sans-serif;font-size:.68rem;letter-spacing:1px;text-transform:uppercase;transition:all .2s;}
.gt-btn:hover{border-color:var(--gold);color:var(--gold);}

/* ── TRACKER ── */
.tracker-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
.t-card{background:var(--bg2);border:1px solid var(--border);padding:1.5rem;}
.t-card-title{font-family:'Oswald',sans-serif;font-size:.68rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:1.2rem;display:flex;align-items:center;gap:.5rem;}
.t-card.full{grid-column:1/-1;}

/* log form */
.log-form{display:flex;gap:.6rem;align-items:flex-end;margin-bottom:1rem;}
.log-form-fields{display:flex;gap:.6rem;flex:1;flex-wrap:wrap;}
.inp-wrap{display:flex;flex-direction:column;gap:.25rem;flex:1;min-width:80px;}
.inp-wrap label{font-size:.58rem;color:var(--gray);letter-spacing:1.5px;text-transform:uppercase;font-family:'Oswald',sans-serif;}
.inp-wrap input{padding:.45rem .6rem;background:var(--bg3);border:1px solid var(--border);color:var(--white);font-family:'Cairo',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;width:100%;}
.inp-wrap input:focus{border-color:var(--gold);}
body.light .inp-wrap input{background:#e5e5e5;}
.btn-primary{padding:.45rem 1.1rem;background:var(--orange);color:#fff;border:none;cursor:pointer;font-family:'Oswald',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:opacity .2s;white-space:nowrap;align-self:flex-end;}
.btn-primary:hover{opacity:.85;}

/* log entries */
.log-entries{display:flex;flex-direction:column;gap:.35rem;max-height:200px;overflow-y:auto;}
.log-entry{display:flex;align-items:center;gap:.75rem;padding:.4rem .7rem;background:var(--bg3);border:1px solid var(--border);font-size:.78rem;}
.le-date{color:var(--gray);font-size:.68rem;min-width:50px;}
.le-vals{flex:1;display:flex;gap:.6rem;flex-wrap:wrap;}
.le-val{color:var(--white);}
.le-val span{color:var(--gold);font-family:'Oswald',sans-serif;font-weight:600;}
.le-del{color:rgba(255,255,255,.18);cursor:pointer;font-size:.75rem;margin-right:auto;}
.le-del:hover{color:#f87171;}

/* chart */
.mini-chart{width:100%;height:80px;margin-top:.75rem;display:block;}

/* notes */
.notes-area{width:100%;min-height:90px;padding:.75rem;background:var(--bg3);border:1px solid var(--border);color:var(--white);font-family:'Cairo',sans-serif;font-size:.85rem;resize:vertical;outline:none;transition:border-color .2s;}
.notes-area:focus{border-color:var(--gold);}
.notes-saved{font-size:.65rem;color:var(--gray);letter-spacing:1px;font-family:'Oswald',sans-serif;margin-top:.4rem;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .hero-content{grid-template-columns:1fr;padding-top:4rem;gap:2rem;}
  .hero-photo-wrap{order:-1;}
  .photo-frame{width:250px;}
  .hero{min-height:auto;}
  .hero-name{font-size:3rem;}
  .tracker-grid{grid-template-columns:1fr;}
  .day-header{padding:1.1rem 1.2rem;}
  .day-body{padding:0 1.2rem 1.5rem;}
  .ex-top{grid-template-columns:26px 1fr;}
  .ex-muscles{display:none;}
  .set-row{grid-template-columns:20px 1fr 1fr 1fr auto auto;}
  .global-timer{padding:.6rem 1rem;gap:.8rem;flex-wrap:wrap;justify-content:center;width:90%;bottom:1rem;}
  .nav-tab{padding:.6rem .85rem;font-size:.68rem;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Ali Workout</div>
  <div class="topbar-actions">
    <button class="btn-icon" onclick="toggleTheme()" title="Dark/Light">☀️</button>
    <button class="btn-icon" onclick="resetChecks()" title="Reset">🔄</button>
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <div class="hero-content">
    <div>
      <div class="hero-badge">PPL Training Program</div>
      <h1 class="hero-name">ALI<span class="hl">WORKOUT</span></h1>
      <p class="hero-program">Push · Pull · Legs</p>
      <div class="hero-stats">
        <div class="stat"><span class="stat-num">3</span><span class="stat-label">أيام تمرين</span></div>
        <div class="stat"><span class="stat-num">1</span><span class="stat-label">يوم راحة</span></div>
        <div class="stat"><span class="stat-num">16</span><span class="stat-label">تمرينة</span></div>
      </div>
    </div>
    <div class="hero-photo-wrap">
      <div class="photo-frame">
        <img class="hero-photo" id="heroPhoto" alt="Ali">
        <div class="photo-accent">ALI<br>PPL<br>PROGRAM</div>
      </div>
    </div>
  </div>
</section>

<!-- TABS -->
<div class="nav-tabs">
  <button class="nav-tab active" onclick="showPanel('workout',this)">🏋️ التمارين</button>
  <button class="nav-tab" onclick="showPanel('tracker',this)">📊 المتابعة</button>
</div>

<!-- ══ WORKOUT PANEL ══ -->
<div class="panel active" id="panel-workout">
  <div class="section-header" style="margin-top:2rem">
    <p class="section-label">Training Schedule</p>
    <h2 class="section-title">الجدول الأسبوعي</h2>
  </div>
  <div id="workout-cards"></div>
</div>

<!-- ══ TRACKER PANEL ══ -->
<div class="panel" id="panel-tracker">
  <div class="section-header" style="margin-top:2rem">
    <p class="section-label">Your Progress</p>
    <h2 class="section-title">تتبع التقدم</h2>
  </div>
  <div class="tracker-grid">

    <!-- MACROS LOG -->
    <div class="t-card">
      <div class="t-card-title">🥩 سجل الماكروز</div>
      <div class="log-form">
        <div class="log-form-fields">
          <div class="inp-wrap"><label>بروتين (g)</label><input type="number" id="inp-p" placeholder="0" min="0"></div>
          <div class="inp-wrap"><label>كارب (g)</label><input type="number" id="inp-c" placeholder="0" min="0"></div>
          <div class="inp-wrap"><label>دهون (g)</label><input type="number" id="inp-f" placeholder="0" min="0"></div>
        </div>
        <button class="btn-primary" onclick="addMacro()">سجّل</button>
      </div>
      <div class="log-entries" id="macro-entries"></div>
    </div>

    <!-- WEIGHT LOG -->
    <div class="t-card">
      <div class="t-card-title">⚖️ سجل الوزن</div>
      <div class="log-form">
        <div class="log-form-fields">
          <div class="inp-wrap"><label>الوزن (kg)</label><input type="number" id="inp-w" placeholder="0.0" step="0.1" min="0"></div>
        </div>
        <button class="btn-primary" onclick="addWeight()">سجّل</button>
      </div>
      <div class="log-entries" id="weight-entries"></div>
      <canvas class="mini-chart" id="weight-chart"></canvas>

function getSets() { return S.get('ali_sets',{}); }

function addSet(exKey) {
  const all = getSets();
  if (!all[exKey]) all[exKey] = [];
  all[exKey].push({weight:'',reps:'',rir:'',done:false});
  S.set('ali_sets',all);
  const si = all[exKey].length - 1;
  const container = document.getElementById(`sets-${exKey}`);
  const div = document.createElement('div');
  div.innerHTML = buildSetRow(exKey, si, all[exKey][si]);
  container.appendChild(div.firstElementChild);
}

function saveSetField(exKey, si, field, val) {
  const all = getSets();
  if (!all[exKey]) all[exKey] = [];
  if (!all[exKey][si]) all[exKey][si] = {};
  all[exKey][si][field] = val;
  S.set('ali_sets', all);
}

function toggleSetDone(exKey, si, el) {
  const all = getSets();
  if (!all[exKey]) all[exKey] = [];
  if (!all[exKey][si]) all[exKey][si] = {};
  all[exKey][si].done = !all[exKey][si].done;
  S.set('ali_sets', all);
  el.classList.toggle('done', all[exKey][si].done);
}

function deleteSet(exKey, si) {
  const all = getSets();
  if (!all[exKey]) return;
  all[exKey].splice(si, 1);
  S.set('ali_sets', all);
  // Re-render just this set list
  const container = document.getElementById(`sets-${exKey}`);
  container.innerHTML = all[exKey].map((s,i) => buildSetRow(exKey,i,s)).join('');
}

// ══════════════════════════════════════════
// TIMER
// ══════════════════════════════════════════
let tSecs=90, tMax=90, tInterval=null, tRunning=false;

function openTimer(secs) {
  document.getElementById('gTimer').classList.add('visible');
  tMax=secs; tSecs=secs;
  document.querySelectorAll('.gt-preset').forEach(b=>b.classList.remove('sel'));
  document.querySelectorAll('.gt-preset').forEach(b=>{ if(b.textContent===secs+'s') b.classList.add('sel'); });
  updateTimerDisplay();
  if(!tRunning) toggleTimer();
}

function closeTimer() {
  clearInterval(tInterval); tRunning=false;
  document.getElementById('gTimer').classList.remove('visible');
  document.getElementById('gt-playbtn').textContent='▶ ابدأ';
}

function setPreset(secs, btn) {
  tMax=secs; tSecs=secs;
  document.querySelectorAll('.gt-preset').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  updateTimerDisplay();
  clearInterval(tInterval); tRunning=false;
  document.getElementById('gt-playbtn').textContent='▶ ابدأ';
  document.getElementById('gt-disp').classList.remove('urgent');
}

function toggleTimer() {
  if(tRunning) {
    clearInterval(tInterval); tRunning=false;
    document.getElementById('gt-playbtn').textContent='▶ ابدأ';
  } else {
    tRunning=true;
    document.getElementById('gt-playbtn').textContent='⏸ وقف';
    tInterval = setInterval(()=>{
      tSecs--;
      updateTimerDisplay();
      if(tSecs<=10) document.getElementById('gt-disp').classList.add('urgent');
      if(tSecs<=0) {
        clearInterval(tInterval); tRunning=false;
        document.getElementById('gt-playbtn').textContent='▶ ابدأ';
        document.getElementById('gt-disp').classList.remove('urgent');
        tSecs=tMax; updateTimerDisplay();
        beep();
      }
    },1000);
  }
}

function resetTimer() {
  clearInterval(tInterval); tRunning=false; tSecs=tMax;
  document.getElementById('gt-playbtn').textContent='▶ ابدأ';
  document.getElementById('gt-disp').classList.remove('urgent');
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const m=Math.floor(tSecs/60), s=tSecs%60;
  document.getElementById('gt-disp').textContent=m+':'+String(s).padStart(2,'0');
}

function beep() {
  try {
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    [0,200,400].forEach(d=>setTimeout(()=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=880;
      g.gain.setValueAtTime(.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
      o.start(); o.stop(ctx.currentTime+.3);
    },d));
  } catch(e){}
}

  });

function drawChart() {
  const weights=getWeights();
  const canvas=document.getElementById('weight-chart');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth*2, H=160;
  canvas.width=W; canvas.height=H;
  ctx.clearRect(0,0,W,H);
  const vals=[...weights].reverse().map(w=>w.val);
  if(vals.length<2) return;
  const min=Math.min(...vals)-1, max=Math.max(...vals)+1;
  const pad=24;
  // gradient fill
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'rgba(245,166,35,.25)');
  grad.addColorStop(1,'rgba(245,166,35,0)');
  ctx.beginPath();
  vals.forEach((v,i)=>{
    const x=pad+(i/(vals.length-1))*(W-pad*2);
    const y=H-pad-((v-min)/(max-min))*(H-pad*2);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.lineTo(pad+(vals.length-1)/(vals.length-1)*(W-pad*2),H);
  ctx.lineTo(pad,H);
  ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();
  // line
  ctx.strokeStyle='#F5A623'; ctx.lineWidth=3; ctx.lineJoin='round';
  ctx.beginPath();
  vals.forEach((v,i)=>{
    const x=pad+(i/(vals.length-1))*(W-pad*2);
    const y=H-pad-((v-min)/(max-min))*(H-pad*2);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
  // dots
  vals.forEach((v,i)=>{
    const x=pad+(i/(vals.length-1))*(W-pad*2);
    const y=H-pad-((v-min)/(max-min))*(H-pad*2);
    ctx.fillStyle='#F5A623';
    ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0A0A0A';
    ctx.beginPath(); ctx.arc(x,y,2.5,0,Math.PI*2); ctx.fill();
  });
}
